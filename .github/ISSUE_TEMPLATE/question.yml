name: Question / discussion
description: Ask about the paper, an experimental choice, or how to apply this to your problem.
title: "[q] "
labels: ["question"]
body:
  - type: textarea
    id: context
    attributes:
      label: Your question
      description: |
        What are you trying to do, and what's the specific point you're stuck on?
        Paper-related questions are welcome here too — please link the section / equation.
    validations:
      required: true
  - type: textarea
    id: what-tried
    attributes:
      label: What you've already tried or read
