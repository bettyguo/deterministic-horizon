name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more concrete
        the repro, the faster we can fix it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the problem.
      placeholder: e.g. `dh evaluate` crashes when `--max-instances 0`.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A short snippet (ideally <20 lines) we can copy-paste.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "1.0.0 (run `python -c 'import deterministic_horizon; print(deterministic_horizon.__version__)'`)"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version & OS
      placeholder: "3.11.6 on macOS 14.4"
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Full traceback or relevant output
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I'm running an actively supported Python (3.10–3.12).
          required: true
